name: Bug report
description: Report a runtime, install, or model loading problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the failure and what you expected.
    validations:
      required: true
  - type: input
    id: hardware
    attributes:
      label: Hardware
      placeholder: Intel Core Ultra 7 155H, Intel Arc A770, etc.
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: OpenVINO device
      placeholder: GPU, CPU, AUTO, NPU
    validations:
      required: true
  - type: textarea
    id: versions
    attributes:
      label: Versions
      description: ComfyUI, OpenVINO, Optimum Intel, Diffusers, Transformers.
      render: text
  - type: textarea
    id: logs
    attributes:
      label: Logs
      render: text
